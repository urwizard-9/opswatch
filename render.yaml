services:
  - type: web
    name: opswatch
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./opswatch.db
      - key: LOG_LEVEL
        value: INFO
      - key: CHECK_INTERVAL_SECONDS
        value: "60"
    healthCheckPath: /health
