name: OpsWatch Security Audit

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 9 * * 1"   # 매주 월요일 09:00 UTC

jobs:
  security:
    name: 의존성 보안 감사
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.13 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: pip-audit 보안 감사
        run: pip-audit --strict --desc

      - name: Trivy 컨테이너 스캔
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          severity: "CRITICAL,HIGH"
          exit-code: "1"
